name: Upload to ImageKit

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload all assets to ImageKit via URL
        env:
          IK_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import re, json, os, urllib.request, urllib.parse, base64, time

          with open('preview/gallery-data.js', 'r') as f:
              content = f.read()

          urls = list(dict.fromkeys(re.findall(r'"u":\s*"(https://res\.cloudinary\.com[^"]+)"', content)))
          print(f"Total unique assets: {len(urls)}")

          private_key = os.environ['IK_PRIVATE_KEY']
          auth = base64.b64encode(f"{private_key}:".encode()).decode()
          headers = {"Content-Type": "application/json", "Authorization": f"Basic {auth}"}

          success, failed = 0, []

          for i, url in enumerate(urls):
              filename = url.split('/')[-1].split('?')[0]
              is_video = '/video/' in url
              folder = '/yarden_makeup_videos' if is_video else '/yarden_makeup'

              payload = json.dumps({"file": url, "fileName": filename, "folder": folder}).encode()
              req = urllib.request.Request("https://upload.imagekit.io/api/v1/files/upload",
                  data=payload, headers=headers, method="POST")

              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      resp = json.loads(r.read())
                      if 'fileId' in resp:
                          success += 1
                          if success % 100 == 0:
                              print(f"✓ {success}/{len(urls)}")
                      else:
                          failed.append({"url": url, "error": str(resp)})
              except Exception as e:
                  failed.append({"url": url, "error": str(e)[:100]})
                  if len(failed) <= 3:
                      print(f"FAIL: {filename} - {e}")

          print(f"\nDone: {success} ok, {len(failed)} failed")
          with open('imagekit-results.json', 'w') as f:
              json.dump({"success": success, "total": len(urls), "failed": failed}, f, indent=2)
          PYEOF

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add imagekit-results.json
          git commit -m "ImageKit upload results" || echo "Nothing to commit"
          git push
