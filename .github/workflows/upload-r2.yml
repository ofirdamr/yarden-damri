name: Upload Videos to R2

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install boto3
        run: pip install boto3

      - name: Upload videos to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python3 - << 'PYEOF'
          import re, os, boto3, urllib.request, json, time
          from botocore.config import Config

          with open('preview/gallery-data.js', 'r') as f:
              content = f.read()

          # Get all unique video URLs
          all_urls = re.findall(r'"u":\s*"(https://[^"]+)"', content)
          video_urls = list(dict.fromkeys([u for u in all_urls if '.mp4' in u or '/video/' in u]))
          print(f"Found {len(video_urls)} unique videos")

          s3 = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto'
          )

          success, failed = 0, []

          for i, url in enumerate(video_urls):
              filename = url.split('/')[-1].split('?')[0]
              # Convert ImageKit URL back to Cloudinary to download
              if 'ik.imagekit.io' in url:
                  # Extract path after Yardendamri/
                  path = re.sub(r'https://ik\.imagekit\.io/Yardendamri/', '', url)
                  dl_url = f"https://res.cloudinary.com/dfjwxc1cw/video/upload/{path}"
              else:
                  dl_url = url

              try:
                  req = urllib.request.Request(dl_url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60) as r:
                      data = r.read()
                  
                  s3.put_object(
                      Bucket='yarden-videos',
                      Key=filename,
                      Body=data,
                      ContentType='video/mp4'
                  )
                  success += 1
                  if success % 20 == 0:
                      print(f"Progress: {success}/{len(video_urls)}")
              except Exception as e:
                  failed.append({'url': url, 'error': str(e)[:100]})
                  if len(failed) <= 5:
                      print(f"FAIL: {filename} - {e}")

          print(f"Done: {success} uploaded, {len(failed)} failed")
          with open('r2-results.json', 'w') as f:
              json.dump({'success': success, 'total': len(video_urls), 'failed': failed}, f, indent=2)
          PYEOF

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add r2-results.json
          git commit -m "R2 upload results" || echo "Nothing to commit"
          git push
