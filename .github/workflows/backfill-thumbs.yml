name: Backfill Grid Thumbnails

# One-shot, resumable backfill that guarantees every gallery item (image AND video) has a
# small yarden_<id>_thumb.webp on R2, so the grid never loads a full-resolution file or shows
# a brown placeholder. Reads ROOT gallery-data.js for the id list and pulls every source frame
# from our own R2 — no Instagram dependency. Re-run until "created" reaches 0 (fully resumable).

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - name: Backfill thumbnails to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: node backfill-thumbs.js
