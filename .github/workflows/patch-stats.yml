name: Patch Missing Stats

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch stats
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
        run: node patch-stats.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preview/gallery-data.js gallery-data.js preview/instagram-stats.json instagram-stats.json
          git diff --staged --quiet && exit 0
          git commit -m "Patch missing stats for 626 items"
          git push origin HEAD:main
