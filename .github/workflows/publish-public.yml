name: Publish to public site repo

# One-way mirror: this (private) repo is the single source of truth. On every
# push to main — Instagram sync data, Cloudflare Worker admin commits, or hand
# edits — copy ONLY the curated static site (no history, no dev/secret files)
# into the public repo that serves yardendamri.co.il. The public repo is never
# written to by anything else, so there is no clobber.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-public
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (this private repo)
        uses: actions/checkout@v4

      - name: Publish curated static site to the public mirror
        env:
          PUBLIC_REPO: ofirdamr/yardendamri-site
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -e
          # The clean allowlist — exactly what the live site needs, nothing else.
          FILES="index.html about.html services.html gallery.html bride.html \
            bridal-guide.html pricing.html contact.html reviews.html \
            disclaimer.html accessibility-statement.html cookies-policy.html \
            admin.html styles.css a11y.js cloud-storage.js cookie-banner.js \
            remote-state.js site-content.js hero-init.js gallery.js gallery-data.js instagram-stats.json \
            gallery-settings.json social.json robots.txt sitemap.xml \
            sitemap-index.xml sitemap-media.xml favicon.ico favicon.png \
            apple-touch-icon.png share-preview.jpg .well-known/security.txt"

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${PUBLIC_REPO}.git"

          # Clone the mirror if it has any history; otherwise init a fresh repo.
          # (A brand-new repo with no commits has no main branch to check out.)
          if ! git clone "$REMOTE" public 2>/dev/null; then
            mkdir -p public && (cd public && git init -q && git remote add origin "$REMOTE")
          fi
          cd public
          git config user.name "site-mirror[bot]"
          git config user.email "noreply@yardendamri.co.il"
          git checkout main 2>/dev/null || git checkout -b main
          cd ..

          # Prune everything in the mirror except .git, then lay down the
          # allowlist — guarantees the public repo == exactly this set (so a
          # file removed here is removed there too).
          find public -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          for f in $FILES; do
            if [ -e "$f" ]; then mkdir -p "public/$(dirname "$f")"; cp "$f" "public/$f"; else echo "WARN: missing $f"; fi
          done

          # The serving repo ALWAYS needs a CNAME for the custom domain. Write it
          # here unconditionally — the private repo's CNAME was deleted by GitHub
          # when its Pages custom domain was removed during the repo split, so we
          # must not depend on copying it from the source.
          echo "yardendamri.co.il" > public/CNAME

          cd public
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish."
          else
            git commit -m "Publish site $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push -u origin main
          fi
