name: Instagram Auto Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reprocess_images:
        description: 'Re-fetch existing photos at Instagram-max + build small grid thumbnails (resumable)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
        continue-on-error: true
      - name: Sync Instagram
        timeout-minutes: 45
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: node fix.js --target=preview ${{ (inputs.reprocess_images && '--reprocess-images') || '' }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp instagram-stats.json preview/instagram-stats.json
          cp preview/gallery-data.js gallery-data.js
          # Stage only files that exist. A removed/renamed file must NEVER abort the sync:
          # the go-live cleanup deleted preview/*-temp.html, and the old hard-coded
          # `git add preview/index-temp.html ...` then failed every run with
          # "pathspec did not match any files" (exit 128) — the data was uploaded to R2
          # but never committed. The existence guard makes this resilient going forward.
          for f in preview/gallery-data.js gallery-data.js instagram-stats.json preview/instagram-stats.json preview/index.html preview/gallery.html; do
            if [ -e "$f" ]; then git add "$f"; fi
          done
          git diff --staged --quiet && exit 0
          git commit -m "Update Instagram data"
          git push origin HEAD:main
