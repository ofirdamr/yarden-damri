name: Instagram Auto Sync

on:
  schedule:
    - cron: '0 3 * * *'   # כל לילה בשלוש (UTC) = 6 בבוקר ישראל
  workflow_dispatch:        # הפעלה ידנית גם אפשרית

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Instagram sync
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          CLOUDINARY_CLOUD: ${{ secrets.CLOUDINARY_CLOUD }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node sync-all-instagram.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery-data.js
          git diff --staged --quiet || git commit -m "🤖 Auto-sync: new Instagram posts"
          git push
