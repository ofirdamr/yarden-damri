name: Instagram Auto Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Sync Instagram
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: node fix.js --target=preview
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp instagram-stats.json preview/instagram-stats.json
          git add preview/gallery-data.js instagram-stats.json preview/instagram-stats.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop
          git add preview/gallery-data.js instagram-stats.json preview/instagram-stats.json
          git commit -m "Update Instagram data"
          git push origin main
