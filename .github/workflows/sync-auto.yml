name: Instagram Auto Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reprocess_images:
        description: 'Re-fetch existing photos at Instagram-max + build small grid thumbnails (resumable)'
        type: boolean
        default: false
      reprocess_video_thumbs:
        description: 'Build small _thumb.webp grid thumbnails for existing videos (resumable)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
        continue-on-error: true
      - name: Sync Instagram
        timeout-minutes: 120
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: node fix.js ${{ (inputs.reprocess_images && '--reprocess-images') || '' }} ${{ (inputs.reprocess_video_thumbs && '--reprocess-video-thumbs') || '' }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Root-only since preview/ was retired (2026-06-24). fix.js writes the root
          # gallery-data.js and bumps the cache version in root index.html / gallery.html.
          # Stage only files that exist so a missing one never aborts the sync.
          for f in gallery-data.js instagram-stats.json index.html gallery.html; do
            if [ -e "$f" ]; then git add "$f"; fi
          done
          git diff --staged --quiet && exit 0
          git commit -m "Update Instagram data"
          # Race-safe push: a concurrent run (scheduled sync vs. manual reprocess) may have
          # advanced main between checkout and now. Rebase keeping OUR freshly-generated files
          # on conflict (-X theirs = our work during rebase), then retry. Prevents the silent
          # "fetch first" rejection that drops a run's data commit.
          for i in 1 2 3 4 5; do
            git push origin HEAD:main && exit 0
            echo "push rejected — rebasing on latest main (attempt $i)"
            git pull --rebase -X theirs origin main || git rebase --abort
            sleep 3
          done
          echo "::error::could not push after retries"; exit 1
