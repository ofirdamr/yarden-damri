name: Fix Audio — Re-upload all videos with audio

on:
  workflow_dispatch:

jobs:
  fix-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - name: Re-upload all videos with audio
        timeout-minutes: 340
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: node fix.js --fix-audio
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Root-only since preview/ was retired (2026-06-24).
          for f in gallery-data.js instagram-stats.json index.html gallery.html; do
            if [ -e "$f" ]; then git add "$f"; fi
          done
          git diff --staged --quiet && exit 0
          git commit -m "Re-uploaded all videos with audio"
          git push origin HEAD:main
