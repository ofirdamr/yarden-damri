<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Test</title>
<style>
body { background:#111; color:#fff; font-family:sans-serif; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:900px; }
.cell { aspect-ratio:1; background:#222; border-radius:12px; overflow:hidden; }
video { width:100%; height:100%; object-fit:cover; display:block; }
h2 { margin-bottom:8px; }
p { margin:8px 0 20px; font-size:14px; color:#aaa; }
</style>
</head>
<body>
<h2>Video Autoplay Test</h2>
<p>שלושה סרטונים צריכים לזוז אוטומטית — ללא לחיצה. אם זה עובד, הסרטונים בגלריה הראשית יעבדו גם כן.</p>

<div class="grid">
  <div class="cell">
    <video src="https://videos-new.yardendamri.co.il/yarden_17972187162071494.mp4"
      autoplay muted loop playsinline preload="auto"></video>
  </div>
  <div class="cell">
    <video src="https://videos-new.yardendamri.co.il/yarden_18124163572566762.mp4"
      autoplay muted loop playsinline preload="auto"></video>
  </div>
  <div class="cell">
    <video src="https://videos-new.yardendamri.co.il/yarden_18082854338447188.mp4"
      autoplay muted loop playsinline preload="auto"></video>
  </div>
</div>

<br><br>
<p>לחיצה על סרטון + שמע (לחצי Play):</p>
<video src="https://videos-new.yardendamri.co.il/yarden_17972187162071494.mp4"
  controls preload="metadata" style="max-width:400px;border-radius:12px;display:block;"></video>

<script>
document.querySelectorAll('video[autoplay]').forEach(v => {
  v.play().catch(e => {
    const c = v.parentElement;
    c.style.display = 'flex';
    c.style.alignItems = 'center';
    c.style.justifyContent = 'center';
    c.innerHTML = '<span style="color:#aaa;font-size:13px;padding:10px;text-align:center;">Autoplay blocked — tap to play</span>';
    c.onclick = () => { c.innerHTML = ''; const nv = document.createElement('video'); nv.src = v.src; nv.autoplay = true; nv.muted = true; nv.loop = true; nv.playsInline = true; nv.style.cssText='width:100%;height:100%;object-fit:cover;'; c.appendChild(nv); nv.play(); };
  });
});
</script>
</body>
</html>
