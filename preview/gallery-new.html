<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גלריה — ירדן דמרי</title>
  <meta name="description" content="גלריית עבודות איפור של ירדן דמרי — כלות, ערב, הפקות ואירועים." />
  <link rel="preconnect" href="https://images.yardendamri.co.il" />
  <link rel="preconnect" href="https://videos-new.yardendamri.co.il" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet" />
  <style>
    :root{
      --cream:#fdf8f5; --warm:#F5F0EB; --blush:#D4A898; --rose:#B07060;
      --deep:#7A4A34; --gold:#B89060; --text:#1A1A1A; --light:#F8F5F2;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Heebo',sans-serif; background:var(--cream); color:var(--text);
      -webkit-font-smoothing:antialiased;
    }
    header.g-head{
      text-align:center; padding:64px 20px 36px;
      background:linear-gradient(180deg,var(--warm),var(--cream));
    }
    header.g-head .eyebrow{
      font-size:.72rem; letter-spacing:.28em; text-transform:uppercase;
      color:var(--rose); margin-bottom:14px;
    }
    header.g-head h1{
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-weight:400; font-size:clamp(2rem,6vw,3.4rem); color:var(--deep);
    }
    header.g-head p{ margin-top:14px; color:#5a4a40; font-size:.95rem; }

    /* Filter bar */
    .g-filters{
      display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
      padding:24px 16px 8px; max-width:900px; margin:0 auto;
    }
    .g-filters button{
      font-family:'Heebo',sans-serif; font-size:.85rem; cursor:pointer;
      border:1px solid var(--blush); background:transparent; color:var(--deep);
      padding:8px 18px; border-radius:999px; transition:.2s;
    }
    .g-filters button.active,
    .g-filters button:hover{ background:var(--deep); color:#fff; border-color:var(--deep); }

    /* Grid */
    .g-grid{
      max-width:1280px; margin:32px auto; padding:0 14px;
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    }
    @media(max-width:1080px){ .g-grid{ grid-template-columns:repeat(3,1fr);} }
    @media(max-width:680px){ .g-grid{ grid-template-columns:repeat(2,1fr); gap:7px;} }

    .g-tile{
      position:relative; aspect-ratio:1/1; overflow:hidden; border-radius:6px;
      background:#e7ddd5; cursor:pointer;
    }
    .g-tile img,
    .g-tile video{
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform .45s ease;
    }
    .g-tile:hover img,
    .g-tile:hover video{ transform:scale(1.05); }
    .g-tile .vid-badge{
      position:absolute; top:8px; left:8px; z-index:2;
      width:26px; height:26px; border-radius:50%;
      background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .g-tile .vid-badge svg{ width:13px; height:13px; fill:#fff; }

    .g-more{ text-align:center; margin:24px 0 80px; }
    .g-more button{
      font-family:'Heebo',sans-serif; font-size:.95rem; cursor:pointer;
      background:var(--deep); color:#fff; border:none;
      padding:14px 40px; border-radius:999px; transition:.2s;
    }
    .g-more button:hover{ background:var(--rose); }
    .g-empty{ text-align:center; color:#8a7a70; padding:60px 20px; }

    /* Lightbox */
    .lb{
      display:none; position:fixed; inset:0; z-index:9999;
      background:rgba(20,12,8,.94); align-items:center; justify-content:center;
    }
    .lb.open{ display:flex; }
    .lb .lb-media{ max-width:92vw; max-height:88vh; }
    .lb .lb-media img,
    .lb .lb-media video{ max-width:92vw; max-height:88vh; border-radius:6px; display:block; }
    .lb .lb-close,
    .lb .lb-nav{
      position:absolute; background:rgba(255,255,255,.12); color:#fff; border:none;
      width:48px; height:48px; border-radius:50%; font-size:1.4rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:.2s;
    }
    .lb .lb-close:hover,.lb .lb-nav:hover{ background:rgba(255,255,255,.28); }
    .lb .lb-close{ top:20px; left:20px; }
    .lb .lb-prev{ right:20px; top:50%; transform:translateY(-50%); }
    .lb .lb-next{ left:20px; top:50%; transform:translateY(-50%); }
    @media(max-width:680px){
      .lb .lb-prev{ right:8px; } .lb .lb-next{ left:8px; }
      .lb .lb-nav{ width:40px; height:40px; }
    }
  </style>
</head>
<body>
  <header class="g-head">
    <div class="eyebrow">העבודות שלי</div>
    <h1>גלריה</h1>
    <p>איפור כלות, ערב, הפקות ואירועים</p>
  </header>

  <div class="g-filters" id="g-filters">
    <button class="active" data-f="all">הכל</button>
    <button data-f="photo">תמונות</button>
    <button data-f="video">סרטונים</button>
  </div>

  <div class="g-grid" id="g-grid" role="list" aria-label="גלריית עבודות"></div>
  <div class="g-more" id="g-more"></div>

  <!-- Lightbox -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="תצוגת מדיה">
    <button class="lb-close" id="lb-close" aria-label="סגור">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="הקודם">&#8250;</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="הבא">&#8249;</button>
    <div class="lb-media" id="lb-media"></div>
  </div>

  <script src="gallery-data.js"></script>
  <script>
  (function(){
    "use strict";
    var ALL = (typeof GALLERY_IMAGES !== 'undefined' && Array.isArray(GALLERY_IMAGES)) ? GALLERY_IMAGES.slice() : [];
    var PER = 40;
    var shown = 0;
    var filter = 'all';
    var view = [];          // currently filtered items
    var grid = document.getElementById('g-grid');
    var moreWrap = document.getElementById('g-more');

    function isVid(it){ return !!(it && (it.video || (it.u && it.u.indexOf('.mp4') !== -1))); }

    function applyFilter(){
      if (filter === 'photo') view = ALL.filter(function(i){ return !isVid(i); });
      else if (filter === 'video') view = ALL.filter(isVid);
      else view = ALL.slice();
      shown = 0;
      grid.innerHTML = '';
      if (!view.length){ grid.innerHTML = '<div class="g-empty">אין פריטים להצגה</div>'; moreWrap.innerHTML=''; return; }
      renderMore();
    }

    // IntersectionObserver: play videos when visible, pause off-screen. No play button.
    var vidObs = ('IntersectionObserver' in window) ? new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        var v = e.target;
        if (e.isIntersecting){ v.muted = true; var p = v.play(); if(p && p.catch) p.catch(function(){}); }
        else { v.pause(); }
      });
    }, { threshold: 0.25 }) : null;

    function tileFor(it, idx){
      var tile = document.createElement('div');
      tile.className = 'g-tile';
      tile.setAttribute('role','listitem');
      if (isVid(it)){
        var v = document.createElement('video');
        v.src = it.u;
        v.poster = it.thumb || '';
        v.muted = true; v.loop = true; v.autoplay = true;
        v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline','');
        v.setAttribute('preload','metadata');
        v.setAttribute('aria-label', (it.a ? it.a.substring(0,80) : 'סרטון'));
        tile.appendChild(v);
        var badge = document.createElement('div');
        badge.className = 'vid-badge';
        badge.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        tile.appendChild(badge);
        if (vidObs) vidObs.observe(v);
      } else {
        var img = document.createElement('img');
        img.src = it.u;
        img.loading = 'lazy'; img.decoding = 'async';
        img.alt = (it.a ? it.a.substring(0,120) : 'תמונת איפור של ירדן דמרי');
        tile.appendChild(img);
      }
      tile.addEventListener('click', function(){ openLb(idx); });
      return tile;
    }

    function renderMore(){
      var end = Math.min(shown + PER, view.length);
      var frag = document.createDocumentFragment();
      for (var i = shown; i < end; i++){ frag.appendChild(tileFor(view[i], i)); }
      grid.appendChild(frag);
      shown = end;
      moreWrap.innerHTML = '';
      if (shown < view.length){
        var b = document.createElement('button');
        b.textContent = 'הצגת עוד';
        b.addEventListener('click', renderMore);
        moreWrap.appendChild(b);
      }
    }

    // ---- Lightbox ----
    var lb = document.getElementById('lb');
    var lbMedia = document.getElementById('lb-media');
    var lbIdx = 0;

    function showLb(){
      var it = view[lbIdx];
      if (!it) return;
      lbMedia.innerHTML = '';
      if (isVid(it)){
        var v = document.createElement('video');
        v.src = it.u; v.poster = it.thumb || '';
        v.controls = true; v.autoplay = true; v.loop = true;
        v.setAttribute('playsinline','');
        lbMedia.appendChild(v);
      } else {
        var img = document.createElement('img');
        img.src = it.u; img.alt = (it.a ? it.a.substring(0,120) : '');
        lbMedia.appendChild(img);
      }
    }
    function openLb(idx){ lbIdx = idx; lb.classList.add('open'); document.body.style.overflow='hidden'; showLb(); }
    function closeLb(){ lb.classList.remove('open'); document.body.style.overflow=''; lbMedia.innerHTML=''; }
    function step(d){ lbIdx = (lbIdx + d + view.length) % view.length; showLb(); }

    document.getElementById('lb-close').addEventListener('click', closeLb);
    document.getElementById('lb-prev').addEventListener('click', function(){ step(1); });  // RTL: prev = visual right
    document.getElementById('lb-next').addEventListener('click', function(){ step(-1); });
    lb.addEventListener('click', function(e){ if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', function(e){
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      else if (e.key === 'ArrowRight') step(1);
      else if (e.key === 'ArrowLeft') step(-1);
    });

    // ---- Filters ----
    document.getElementById('g-filters').addEventListener('click', function(e){
      var btn = e.target.closest('button'); if (!btn) return;
      filter = btn.getAttribute('data-f');
      Array.prototype.forEach.call(this.querySelectorAll('button'), function(b){ b.classList.toggle('active', b === btn); });
      applyFilter();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ---- Init ----
    if (!ALL.length){
      grid.innerHTML = '<div class="g-empty">נתוני הגלריה לא נטענו</div>';
    } else {
      applyFilter();
    }
  })();
  </script>
</body>
</html>
