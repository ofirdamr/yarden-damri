<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fix Hero Video</title>
<style>body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f5f5;}
button{padding:20px 40px;font-size:20px;background:#2196F3;color:white;border:none;border-radius:10px;cursor:pointer;}
#status{margin-top:20px;font-size:18px;}</style>
</head>
<body>
<button onclick="fix()">Tap to Fix Hero Video</button>
<div id="status"></div>
<script>
function fix() {
  document.getElementById('status').textContent = 'Updating...';
  fetch('https://yarden-admin.ofirdamr.workers.dev/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-Admin-Password': 'makeup2026'},
    body: JSON.stringify({heroVideo: 'https://ik.imagekit.io/yardenvideos/yarden_makeup_18352618189204100.mp4'})
  }).then(r => r.text()).then(t => {
    document.getElementById('status').textContent = 'Done: ' + t;
  }).catch(e => {
    document.getElementById('status').textContent = 'Error: ' + e;
  });
}
</script>
</body>
</html>
