<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Fix KV Video URLs</title></head>
<body>
<h2>Fix Gallery Settings</h2>
<pre id="log">Starting...</pre>
<script>
async function fix() {
  const log = document.getElementById('log');
  try {
    log.textContent = 'Fetching...';
    const res = await fetch('https://yarden-admin.ofirdamr.workers.dev/settings');
    log.textContent = 'Status: ' + res.status + ' ' + res.statusText;
    const text = await res.text();
    log.textContent += '
Body: ' + text.substring(0,300);
  } catch(e) {
    log.textContent = 'ERROR: ' + e.message;
  }
}
fix();
</script>
</body>
</html>
