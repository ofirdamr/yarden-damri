<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Fix Video URLs</title></head>
<body>
<h2>Fix Video URLs in Settings</h2>
<pre id="log">Starting...</pre>
<script>
const OLD = 'https://ik.imagekit.io/yardenvideos/';
const NEW = 'https://videos.yardendamri.co.il/';
const WORKER = 'https://api.yardendamri.co.il';

async function fix() {
  const log = document.getElementById('log');
  
  log.textContent = 'Fetching settings...';
  const res = await fetch(WORKER + '/settings', { cache: 'no-cache' });
  log.textContent = 'Status: ' + res.status;
  if (!res.ok) { log.textContent += ' FAILED'; return; }
  
  const data = await res.json();
  log.textContent += '
Keys: ' + Object.keys(data).join(', ');
  
  const admin = data.admin || {};
  log.textContent += '
Admin keys: ' + Object.keys(admin).join(', ');
  
  let changed = 0;
  
  // Fix cats
  if (admin.cats) {
    log.textContent += '
Cat keys: ' + Object.keys(admin.cats).length;
    const newCats = {};
    for (const [k, v] of Object.entries(admin.cats)) {
      const newKey = k.includes(OLD) ? k.replace(OLD, NEW) : k;
      if (newKey !== k) changed++;
      newCats[newKey] = v;
    }
    admin.cats = newCats;
  }
  
  // Fix hidden
  if (admin.hidden) {
    admin.hidden = admin.hidden.map(h => h.includes(OLD) ? h.replace(OLD, NEW) : h);
  }
  // Fix order
  if (admin.order) {
    admin.order = admin.order.map(o => o.includes(OLD) ? o.replace(OLD, NEW) : o);
  }
  // Fix heroVideo
  if (data.heroVideo && data.heroVideo.includes(OLD)) {
    data.heroVideo = data.heroVideo.replace(OLD, NEW);
  }
  
  data.admin = admin;
  log.textContent += '
Changed: ' + changed + ' keys. Saving...';
  
  const pwd = prompt('Enter admin password:');
  if (!pwd) { log.textContent += '
Cancelled.'; return; }
  
  const saveRes = await fetch(WORKER + '/settings', {
    method: 'POST',
    headers: { 'X-Admin-Password': pwd, 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  const saveData = await saveRes.json();
  log.textContent += '
Save: ' + JSON.stringify(saveData);
  log.textContent += '
DONE. Changed ' + changed + ' keys.';
}

fix().catch(e => document.getElementById('log').textContent += '
ERROR: ' + e.message);
</script>
</body>
</html>
